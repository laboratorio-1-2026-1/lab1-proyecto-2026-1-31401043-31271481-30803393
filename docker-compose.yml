# ============================================================
# Docker Compose - SmartGym API
# ============================================================
# Levanta: la API FastAPI + PostgreSQL en contenedores aislados.
#
# Uso rápido:
#   1. Asegúrate de tener un archivo '.env' en la raíz del proyecto.
#      (cópialo desde .env.example.docker y ajusta los valores)
#   2. docker compose up --build
#   3. La API estará disponible en: http://localhost:8000
#   4. Para detener: docker compose down
#   5. Para borrar también los datos de la BD: docker compose down -v
# ============================================================

services:

  # ---- Base de Datos PostgreSQL ----------------------------------------
  db:
    image: postgres:16-alpine
    container_name: smartgym_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Persiste los datos de la BD en un volumen Docker nombrado
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expone el puerto de Postgres en la máquina host (útil para acceder con pgAdmin, DBeaver, etc.)
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- API FastAPI -------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartgym_api
    restart: unless-stopped
    env_file:
      # Lee todas las variables de entorno desde el archivo .env
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        # Espera a que PostgreSQL esté listo antes de iniciar la API
        condition: service_healthy

# ---- Volúmenes nombrados -------------------------------------------------
volumes:
  postgres_data:
    driver: local